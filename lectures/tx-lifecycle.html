<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>트랜잭션 생애주기</title>
<style>
  :root{
    --bg:#0F0F1F; --panel:#1A1A33; --line:#2B2B4D;
    --ink:#E8E9F5; --muted:#8A8FB5; --dim:#5A5F85;
    --indigo:#5B6CFF; --indigo-soft:rgba(91,108,255,.14);
    --mint:#39C6A5; --mint-soft:rgba(57,198,165,.13);
    --gold:#FFC94D;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;overflow:hidden}

  header{padding:22px 30px 0;flex:0 0 auto}
  h1{font-size:21px;font-weight:800;letter-spacing:-.01em}
  h1 em{font-style:normal;color:var(--indigo)}
  .sub{color:var(--muted);font-size:12.5px;margin-top:4px}

  main{flex:1 1 auto;display:flex;gap:20px;padding:18px 30px;min-height:0}

  /* stage map */
  .map{flex:1 1 auto;position:relative;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;overflow:hidden}
  svg{width:100%;height:100%;display:block}

  /* side rail */
  .rail{flex:0 0 300px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:4px}
  .step{background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:11px 13px;cursor:pointer;transition:border-color .2s,background .2s,opacity .2s;opacity:.5}
  .step:hover{border-color:var(--dim)}
  .step.on{opacity:1;border-color:var(--indigo);background:var(--indigo-soft)}
  .step.done{opacity:1;border-color:rgba(57,198,165,.4)}
  .step .row{display:flex;align-items:center;gap:9px}
  .num{width:22px;height:22px;border-radius:50%;background:var(--line);color:var(--ink);
    font-size:11.5px;font-weight:700;display:grid;place-items:center;flex:0 0 auto}
  .step.on .num{background:var(--indigo)}
  .step.done .num{background:var(--mint);color:#0F0F1F}
  .step .t{font-size:13.5px;font-weight:700}
  .step .wk{margin-left:auto;font-size:10px;font-weight:700;color:#0F0F1F;
    background:var(--mint);border-radius:4px;padding:1px 6px}
  .step .d{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5;display:none}
  .step.on .d{display:block}

  footer{flex:0 0 auto;padding:0 30px 22px;display:flex;align-items:center;gap:12px}
  button{font:inherit;font-size:13.5px;font-weight:700;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:9px 18px;cursor:pointer;
    transition:border-color .15s,transform .1s;white-space:nowrap}
  button:hover:not(:disabled){border-color:var(--indigo)}
  button:active:not(:disabled){transform:scale(.97)}
  button:disabled{opacity:.35;cursor:default}
  button.primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .conclusion{margin-left:auto;font-size:13px;color:var(--muted);opacity:0;transition:opacity .5s}
  .conclusion.show{opacity:1}
  .conclusion b{color:var(--mint)}

  text{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .zone-label{font-size:11px;fill:var(--dim);font-weight:700;letter-spacing:1px}
  .box-title{font-size:13.5px;font-weight:700;fill:var(--ink)}
  .box-sub{font-size:10.5px;fill:var(--muted)}
  .flow{font-size:11px;fill:var(--muted)}

  @media (max-width:1000px){
    main{flex-direction:column}
    .rail{flex:0 0 auto;flex-direction:row;overflow-x:auto}
    .step{min-width:180px}
    .step .d{display:none !important}
    .conclusion{display:none}
  }
</style>
</head>
<body>
<header>
  <h1>트랜잭션 생애주기 <em>— 내 tx는 누구를 거쳐 모두의 진실이 될까</em></h1>
  <div class="sub">단계를 넘기며 확인하세요. 오른쪽 항목을 눌러 바로 이동할 수도 있습니다. (← → 키로도 이동)</div>
</header>

<main>
  <div class="map">
    <svg id="svg" viewBox="0 0 900 500" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <div class="rail" id="rail"></div>
</main>

<footer>
  <button id="prev">이전</button>
  <button id="next" class="primary">다음 단계</button>
  <button id="reset">처음부터</button>
  <div class="conclusion" id="conclusion">
    2번부터 6번까지 전부 <b>geth(EL)</b> 안에서 일어난다. 그래서 우리는 geth를 읽는다.
  </div>
</footer>

<script>
(function(){
"use strict";
const NS="http://www.w3.org/2000/svg";
const svg=document.getElementById('svg');
const C={line:"#2B2B4D",dim:"#5A5F85",ink:"#E8E9F5",muted:"#8A8FB5",
         indigo:"#5B6CFF",mint:"#39C6A5",gold:"#FFC94D",panel:"#1A1A33",bg:"#0F0F1F"};

const STEPS=[
  {n:1,t:"지갑이 서명",wk:null,
   d:"개인키로 상태 변경 요청서에 서명한다. 아직 네트워크에는 아무 일도 일어나지 않았다.",
   zone:"wallet"},
  {n:2,t:"어느 노드의 RPC가 접수",wk:"2회차",
   d:"내 지갑이 연결된 노드가 tx를 받는다. 직접 띄운 노드일 수도, Infura 같은 서비스의 노드일 수도 있다.",
   zone:"geth"},
  {n:3,t:"txpool 대기 + 전파",wk:"2·6회차",
   d:"입장 검사를 통과한 tx가 멤풀에 들어가고, p2p 가십으로 전 세계 노드에 퍼진다.",
   zone:"network"},
  {n:4,t:"제안자가 블록에 포함",wk:"5회차",
   d:"그 슬롯의 제안자로 뽑힌 검증자가 자기 멤풀에서 tx를 골라 블록을 조립한다.",
   zone:"proposer"},
  {n:5,t:"모든 노드가 재실행",wk:"3회차",
   d:"블록이 전파되면 각 노드가 EVM으로 직접 실행해 결과를 대조한다. 틀리면 그 블록은 버려진다.",
   zone:"verify"},
  {n:6,t:"상태 확정",wk:"4회차",
   d:"모두가 같은 새 상태에 도달한다. 내 tx가 모두의 진실이 되는 순간이다.",
   zone:"state"},
];

let cur=0;

/* ---------- helpers ---------- */
function el(tag,a,txt){const e=document.createElementNS(NS,tag);
  for(const k in a)e.setAttribute(k,a[k]);
  if(txt!==undefined)e.textContent=txt;return e;}

function roundRect(x,y,w,h,r,fill,stroke,sw,dash){
  const a={x,y,width:w,height:h,rx:r,fill:fill||"none"};
  if(stroke){a.stroke=stroke;a["stroke-width"]=sw||1.5;}
  if(dash)a["stroke-dasharray"]=dash;
  return el('rect',a);
}
function marker(defs,id,color){
  const m=el('marker',{id,viewBox:"0 0 10 10",refX:9,refY:5,markerWidth:7,markerHeight:7,orient:"auto"});
  m.appendChild(el('path',{d:"M1 1 L9 5 L1 9",fill:"none",stroke:color,"stroke-width":1.8,
    "stroke-linecap":"round","stroke-linejoin":"round"}));
  defs.appendChild(m);
}

/* ---------- static scene ---------- */
const NODES=[]; // network peer positions
(function seedNodes(){
  const cx=635,cy=235,rx=88,ry=74;
  for(let i=0;i<11;i++){
    const a=(i/11)*Math.PI*2 - Math.PI/2;
    NODES.push({x:cx+Math.cos(a)*rx, y:cy+Math.sin(a)*ry});
  }
})();

function draw(step){
  svg.innerHTML='';
  const defs=el('defs');
  marker(defs,'ar-indigo',C.indigo);
  marker(defs,'ar-mint',C.mint);
  marker(defs,'ar-dim',C.dim);
  svg.appendChild(defs);

  const active=STEPS[step].zone;
  const reached=n=>step>=n;

  // ===== geth boundary =====
  const gethOn = step>=1 && step<=5;
  svg.appendChild(roundRect(215,60,640,310,18,"none",gethOn?C.indigo:C.line,gethOn?2:1.2,"7 6"));
  svg.appendChild(el('text',{x:235,y:84,class:"zone-label",
    fill:gethOn?C.indigo:C.dim},"GETH (EL) 의 영역"));

  // ===== wallet =====
  const wOn = active==="wallet";
  svg.appendChild(roundRect(45,205,130,80,12,wOn?"rgba(91,108,255,.16)":"none",
    wOn?C.indigo:C.line,wOn?2:1.4));
  svg.appendChild(el('text',{x:110,y:238,"text-anchor":"middle",class:"box-title",
    fill:wOn?C.ink:C.muted},"지갑"));
  svg.appendChild(el('text',{x:110,y:258,"text-anchor":"middle",class:"box-sub"},
    step===0?"서명 중":"개인키 보관"));

  // wallet -> rpc arrow
  if(step>=1){
    svg.appendChild(el('path',{d:"M180 245 L255 245",stroke:C.indigo,"stroke-width":2,
      "marker-end":"url(#ar-indigo)",fill:"none"}));
    svg.appendChild(el('text',{x:217,y:236,"text-anchor":"middle",class:"flow"},"전송"));
  }

  // ===== RPC =====
  const rOn = active==="geth";
  svg.appendChild(roundRect(260,205,120,80,12,rOn?"rgba(91,108,255,.16)":"none",
    rOn?C.indigo:(reached(1)?C.dim:C.line),rOn?2:1.4));
  svg.appendChild(el('text',{x:320,y:238,"text-anchor":"middle",class:"box-title",
    fill:reached(1)?C.ink:C.muted},"RPC"));
  svg.appendChild(el('text',{x:320,y:258,"text-anchor":"middle",class:"box-sub"},"요청 접수 창구"));

  // rpc -> mempool
  if(step>=2){
    svg.appendChild(el('path',{d:"M385 245 L403 245",stroke:C.indigo,"stroke-width":2,
      "marker-end":"url(#ar-indigo)",fill:"none"}));
  }

  // ===== mempool =====
  const mOn = active==="network";
  const mReached = step>=2;
  svg.appendChild(roundRect(408,205,102,80,12,mOn?"rgba(91,108,255,.16)":"none",
    mOn?C.indigo:(mReached?C.dim:C.line),mOn?2:1.4));
  svg.appendChild(el('text',{x:459,y:238,"text-anchor":"middle",class:"box-title",
    fill:mReached?C.ink:C.muted},"txpool"));
  svg.appendChild(el('text',{x:459,y:258,"text-anchor":"middle",class:"box-sub"},"멤풀 대기실"));

  // ===== p2p network cloud =====
  const gossipOn = step>=2;
  NODES.forEach((p,i)=>{
    const lit = gossipOn && (step>=2);
    const isProposer = step>=3 && i===4;
    const verified = step>=4;
    let col = C.line, r=7;
    if(lit) col = C.indigo;
    if(verified) col = C.mint;
    if(isProposer) { col = C.gold; r=10; }
    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r,fill:C.panel,stroke:col,"stroke-width":2}));
  });
  // gossip links
  if(gossipOn){
    for(let i=0;i<NODES.length;i++){
      const a=NODES[i], b=NODES[(i+1)%NODES.length];
      svg.appendChild(el('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,
        stroke: step>=4?"rgba(57,198,165,.32)":"rgba(91,108,255,.3)","stroke-width":1.2}));
    }
    svg.appendChild(el('path',{d:"M515 245 L540 240",stroke:C.indigo,"stroke-width":2,
      "marker-end":"url(#ar-indigo)",fill:"none",opacity:step>=2?1:0}));
  }
  svg.appendChild(el('text',{x:635,y:340,"text-anchor":"middle",class:"box-sub",
    fill:gossipOn?C.muted:C.line},
    step>=4?"모든 노드가 재실행해 대조":(step>=3?"제안자가 블록 조립":"p2p 가십으로 전파")));

  // proposer callout
  if(step>=3){
    const p=NODES[4];
    svg.appendChild(el('text',{x:p.x,y:p.y-20,"text-anchor":"middle",class:"box-sub",
      fill:C.gold},"제안자"));
  }

  // ===== state =====
  const sOn = active==="state";
  svg.appendChild(roundRect(752,185,96,105,14,sOn?"rgba(57,198,165,.16)":"none",
    sOn?C.mint:(step>=5?C.mint:C.line),sOn?2.5:1.4));
  svg.appendChild(el('text',{x:800,y:222,"text-anchor":"middle",class:"box-title",
    fill:step>=5?C.ink:C.muted},"새 상태"));
  svg.appendChild(el('text',{x:800,y:242,"text-anchor":"middle",class:"box-sub"},"상태 N+1"));
  if(step>=5){
    svg.appendChild(el('text',{x:800,y:265,"text-anchor":"middle",class:"box-sub",
      fill:C.mint},"확정"));
    svg.appendChild(el('path',{d:"M735 237 L745 237",stroke:C.mint,"stroke-width":2,
      "marker-end":"url(#ar-mint)",fill:"none"}));
  }

  // ===== stage banner =====
  const s=STEPS[step];
  svg.appendChild(roundRect(45,405,810,58,12,"rgba(91,108,255,.10)",C.indigo,1.4));
  svg.appendChild(el('text',{x:70,y:430,class:"box-title",fill:C.indigo},`${s.n}. ${s.t}`));
  const desc=el('text',{x:70,y:450,class:"box-sub",fill:C.ink});
  desc.textContent=s.d;
  svg.appendChild(desc);
}

/* ---------- rail ---------- */
const rail=document.getElementById('rail');
STEPS.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='step'; div.dataset.i=i;
  div.innerHTML=`<div class="row"><div class="num">${s.n}</div>
    <div class="t">${s.t}</div>${s.wk?`<div class="wk">${s.wk}</div>`:''}</div>
    <div class="d">${s.d}</div>`;
  div.addEventListener('click',()=>{cur=i;render();});
  rail.appendChild(div);
});

const prev=document.getElementById('prev'),
      next=document.getElementById('next'),
      reset=document.getElementById('reset'),
      conclusion=document.getElementById('conclusion');

function render(){
  draw(cur);
  Array.from(rail.children).forEach((d,i)=>{
    d.classList.toggle('on',i===cur);
    d.classList.toggle('done',i<cur);
  });
  prev.disabled=cur===0;
  next.disabled=cur===STEPS.length-1;
  conclusion.classList.toggle('show',cur===STEPS.length-1);
  const el2=rail.children[cur];
  if(el2&&el2.scrollIntoView) el2.scrollIntoView({block:'nearest',behavior:'smooth'});
}
prev.addEventListener('click',()=>{if(cur>0){cur--;render();}});
next.addEventListener('click',()=>{if(cur<STEPS.length-1){cur++;render();}});
reset.addEventListener('click',()=>{cur=0;render();});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){next.click();e.preventDefault();}
  if(e.key==='ArrowLeft')prev.click();
});
render();
})();
</script>
</body>
</html>
