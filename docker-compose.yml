services:
  bay-dev:
    build: .
    container_name: bay-dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/bay18.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD를 설정하세요}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET을 설정하세요}
      # 토론에서 관리자 배지를 붙일 지갑 주소 (쉼표 구분, 선택)
      ADMIN_WALLETS: ${ADMIN_WALLETS:-}
      # 웹 푸시 (답글 알림)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    volumes:
      # 호스트의 data/ 디렉토리를 그대로 사용 → 기존 가입/제출 데이터 유지
      - ./data:/app/data
    restart: unless-stopped
